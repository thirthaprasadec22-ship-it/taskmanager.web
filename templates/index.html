<!DOCTYPE html>
<html>
<head>
<title>Task Manager</title>

<style>

body{
font-family:Arial;
background:#1f2937;
color:white;
display:flex;
justify-content:center;
margin-top:80px;
}

.container{
background:#111827;
padding:30px;
border-radius:12px;
width:420px;
}

h1{
text-align:center;
}

input{
width:70%;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
}

.task{
display:flex;
justify-content:space-between;
background:#374151;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.done{
text-decoration:line-through;
color:#9ca3af;
}

.delete{
color:red;
text-decoration:none;
margin-left:10px;
}

.complete{
color:#22c55e;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Task Manager</h1>

<form method="POST">
<input name="task" placeholder="Enter task..." required>
<button>Add</button>
</form>

{% for task in tasks %}

<div class="task">

<span class="{% if task[2]==1 %}done{% endif %}">
{{task[1]}}
</span>

<div>
<a class="complete" href="/done/{{task[0]}}">✔</a>
<a class="delete" href="/delete/{{task[0]}}">✖</a>
</div>

</div>

{% endfor %}

</div>

</body>
</html>
